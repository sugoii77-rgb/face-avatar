<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Avatar</title>
  <style>
    :root {
      --mauve: #b9a8a6;
      --panel: rgba(244, 236, 233, .68);
      --ink: #030303;
      --radius: 15px;
      --mono: "Courier New", "Lucida Console", monospace;
      --serif: "Times New Roman", Times, serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--mauve);
      color: var(--ink);
      font-family: var(--serif);
    }

    button,
    a {
      color: inherit;
      font: inherit;
    }

    [hidden] { display: none !important; }

    .membrane-frame {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: var(--mauve);
    }

    .stage {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    .pill {
      position: fixed;
      left: 9px;
      top: 48.4vh;
      height: 25px;
      min-width: 160px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px;
      border: 0;
      border-radius: 999px;
      background: rgba(244, 236, 233, .72);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .22), 0 2px 12px rgba(60, 41, 41, .12);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      pointer-events: auto;
      transform-origin: left center;
      transition: opacity 260ms ease, transform 360ms cubic-bezier(.2, .9, .2, 1);
    }

    .pill:hover { transform: translateX(4px); }

    body.is-open .pill,
    body.is-info .pill {
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px) scale(.96);
    }

    .plus {
      margin-left: auto;
      font-weight: 700;
      transform: translateY(-1px);
    }

    .camera-request {
      position: fixed;
      left: clamp(248px, 24vw, 320px);
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 12;
      border: 1px solid rgba(255,255,255,.56);
      border-radius: 999px;
      padding: 9px 15px 8px;
      background: rgba(244,236,233,.74);
      color: #151212;
      box-shadow: 0 18px 38px rgba(36,22,22,.17);
      font: 12px/1 "Times New Roman", Times, serif;
      letter-spacing: .04em;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity .45s ease, transform .45s ease, background .35s ease;
    }

    .camera-request:hover {
      background: rgba(255,255,255,.72);
      transform: translateY(-1px);
    }

    body.camera-ready .camera-request,
    body.camera-error .camera-request {
      opacity: .92;
      pointer-events: auto;
      transform: translateY(0);
    }

    .panel {
      position: fixed;
      left: 23px;
      top: 24.2vh;
      width: 300px;
      height: min(420px, calc(100vh - 34px));
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), 0 22px 50px rgba(42, 31, 35, .16);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-13px) scale(.98);
      transition: opacity 380ms ease, transform 520ms cubic-bezier(.16, 1, .3, 1);
    }

    body.is-open .panel,
    body.is-info .panel {
      opacity: 1;
      pointer-events: auto;
      transform: none;
    }

    .panel-scroll {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .menu-head {
      padding: 10px 10px 12px;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1;
      text-transform: uppercase;
    }

    .nav-link {
      padding: 0;
      border: 0;
      background: transparent;
      text-decoration: underline;
      cursor: pointer;
      text-transform: uppercase;
    }

    .brand { text-align: center; margin-top: 14px; }

    .sub-link {
      display: block;
      width: 100%;
      margin-top: 6px;
      text-align: center;
      text-decoration: underline;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 88.4px);
      gap: 4.9px;
      padding: 0 4.9px 26px;
    }

    .thumb {
      width: 88.4px;
      height: 88.4px;
      border: 0;
      border-radius: 9.8px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      color: rgba(0,0,0,.38);
      transition: transform 220ms ease, filter 220ms ease;
    }

    .thumb:hover {
      transform: scale(.96);
      filter: saturate(1.14) contrast(1.05);
    }

    .info {
      display: none;
      padding: 0 12px 28px;
      font-size: 16px;
      line-height: 1.2;
    }

    .info p { margin: 0 0 18px; max-width: 256px; }

    body.is-info .grid { display: none; }
    body.is-info .info { display: block; }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      opacity: .13;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(circle at 12% 31%, rgba(255,255,255,.48), transparent 1px),
        radial-gradient(circle at 67% 71%, rgba(0,0,0,.22), transparent 1px);
      background-size: 5px 5px, 7px 7px;
    }

    @media (max-width: 720px) {
      .pill { left: 10px; top: 50vh; }
      .camera-request { left: 12px; bottom: 64px; }
      .panel {
        left: 10px;
        top: 18vh;
        width: min(300px, calc(100vw - 20px));
      }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .thumb { width: 100%; aspect-ratio: 1; height: auto; }
    }
  </style>
</head>
<body>
  <iframe class="membrane-frame" src="./face-engine.html" allow="camera; autoplay"></iframe>
  <main class="stage">
    <button class="pill" type="button" data-action="open" aria-label="Open menu">
      <span>FACE</span>
      <span>AVATAR</span>
      <span class="plus">+</span>
    </button>
    <button class="camera-request" type="button" data-action="camera">CAMERA</button>

    <section class="panel" aria-label="Menu">
      <div class="panel-scroll">
        <header class="menu-head">
          <button class="nav-link" type="button" data-action="menu">MENU</button>
          <div class="brand">
            <div>FACE&nbsp; AVATAR</div>
            <button class="nav-link sub-link" type="button" data-action="info">INFO</button>
            <button class="nav-link sub-link" type="button" data-action="work" hidden>WORK</button>
          </div>
        </header>

        <div class="grid" id="grid"></div>

        <article class="info">
          <p>An interactive face avatar prototype.</p>
          <p>The portrait tracks your mouse, follows your face through the webcam, and blinks on its own.</p>
          <p>Coming next: text-to-speech with synced lip movement.</p>
        </article>
      </div>
    </section>
  </main>
  <div class="noise"></div>

  <script>
    const body = document.body;
    const grid = document.getElementById("grid");
    const infoButton = document.querySelector('[data-action="info"]');
    const workButton = document.querySelector('[data-action="work"]');
    const cameraButton = document.querySelector('[data-action="camera"]');

    // placeholder tiles - future upgrades land here
    const slots = ["TTS", "LIPS", "VOICE", "POSE", "SCENE", "MORE"];
    slots.forEach((label, index) => {
      const button = document.createElement("button");
      button.className = "thumb";
      button.type = "button";
      button.textContent = label;
      button.style.background =
        `linear-gradient(135deg, hsl(${350 + index * 14}, 26%, ${78 - index * 3}%), hsl(${330 + index * 10}, 20%, ${66 - index * 2}%))`;
      grid.appendChild(button);
    });

    function state(name) {
      body.classList.remove("is-open", "is-info");
      if (name) body.classList.add(name);
      const infoMode = name === "is-info";
      infoButton.hidden = infoMode;
      workButton.hidden = !infoMode;
    }

    document.addEventListener("click", (event) => {
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (!action) return;
      if (action === "camera") {
        requestCamera(true);
        return;
      }
      requestCamera(true);
      if (action === "open" || action === "work" || action === "menu") state("is-open");
      if (action === "info") state("is-info");
    });

    const membraneFrame = document.querySelector(".membrane-frame");
    let lastPointerAt = performance.now();
    let parentCameraRequested = false;
    let parentCameraDenied = false;
    let parentCameraStream = null;
    let parentCameraError = "";
    let parentCameraRequestStarted = 0;

    function notePointer(event) {
      lastPointerAt = performance.now();
      membraneFrame.contentWindow?.postMessage({
        type: "pointer",
        x: event.clientX,
        y: event.clientY
      }, "*");
    }

    document.addEventListener("pointermove", notePointer);
    document.addEventListener("mousemove", notePointer);

    function setCameraClass() {
      const now = performance.now();
      const idle = now - lastPointerAt > 1800;
      const waitingTooLong = parentCameraRequested && now - parentCameraRequestStarted > 2600;
      const shouldShow = !parentCameraStream && (parentCameraDenied || waitingTooLong || (!parentCameraRequested && idle));
      body.classList.toggle("camera-ready", shouldShow && !parentCameraDenied);
      body.classList.toggle("camera-error", shouldShow && parentCameraDenied);
      cameraButton.textContent = parentCameraDenied ? "CAMERA OFF" : "CAMERA";
    }

    function attachParentStream(nextStream) {
      parentCameraStream = nextStream;
      parentCameraDenied = false;
      parentCameraError = "";
      body.classList.remove("camera-ready", "camera-error");
      return membraneFrame.contentWindow?.__attachCameraStream?.(nextStream);
    }

    async function requestCamera(force = false) {
      const idle = performance.now() - lastPointerAt > 1800;
      if (parentCameraStream || parentCameraRequested || (!force && !idle)) return;
      if (parentCameraDenied && !force) return;
      if (!navigator.mediaDevices?.getUserMedia) {
        parentCameraError = "mediaDevices unavailable";
        setCameraClass();
        return;
      }
      parentCameraDenied = false;
      parentCameraRequested = true;
      parentCameraRequestStarted = performance.now();
      setCameraClass();
      try {
        parentCameraError = "";
        const nextStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240, facingMode: "user" },
          audio: false
        });
        await attachParentStream(nextStream);
      } catch (error) {
        parentCameraError = `${error.name || "Error"}: ${error.message || ""}`;
        parentCameraDenied = error.name === "NotAllowedError" || error.name === "SecurityError";
      } finally {
        parentCameraRequested = false;
        setCameraClass();
      }
    }

    setInterval(() => {
      requestCamera(false);
      setCameraClass();
    }, 700);
  </script>
</body>
</html>
